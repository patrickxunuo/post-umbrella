openapi: "3.0.0"
info:
  title: Petstore
  version: "1.0.0"
  description: A trimmed Petstore spec used for OpenAPI import tests.
servers:
  - url: https://petstore.swagger.io/v2
tags:
  - name: pets
  - name: users
components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
paths:
  /pet:
    post:
      tags:
        - pets
      operationId: createPet
      summary: Create a new pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: OK
    put:
      tags:
        - pets
      operationId: updatePet
      summary: Update an existing pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: OK
  /pet/{petId}:
    get:
      tags:
        - pets
      operationId: getPetById
      summary: Find pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        "200":
          description: OK
          content:
            application/json:
              example:
                id: 42
                name: Rex
                tag: dog
    delete:
      tags:
        - pets
      operationId: deletePet
      summary: Delete a pet
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: No Content
  /user:
    get:
      tags:
        - users
      operationId: listUsers
      summary: List users
      responses:
        "200":
          description: OK
