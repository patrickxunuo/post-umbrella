name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || (rm -rf node_modules && npm install)

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Cache Supabase Docker images
        id: supabase-cache
        uses: actions/cache@v4
        with:
          path: /tmp/supabase-docker-images.tar
          key: supabase-docker-${{ hashFiles('supabase/config.toml') }}

      - name: Load cached Docker images
        if: steps.supabase-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/supabase-docker-images.tar

      - name: Start Supabase
        run: supabase start

      - name: Save Docker images to cache
        if: steps.supabase-cache.outputs.cache-hit != 'true'
        run: |
          IMAGES=$(docker images --format '{{.Repository}}:{{.Tag}}' | grep -E 'supabase|postgres|kong|gotrue|postgrest|realtime|storage|imgproxy|deno' | grep -v '<none>')
          docker save $IMAGES -o /tmp/supabase-docker-images.tar

      - name: Write .env from Supabase status
        run: |
          eval "$(supabase status -o env)"
          echo "VITE_SUPABASE_URL=http://127.0.0.1:54321" > .env
          echo "VITE_SUPABASE_ANON_KEY=${ANON_KEY}" >> .env
          echo "SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}" >> .env
          cat .env

      - name: Serve Edge Functions
        run: supabase functions serve --no-verify-jwt &

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http-get://127.0.0.1:5173 --timeout 60000

      - name: Run Playwright tests
        id: tests
        run: npx playwright test

      - name: Write test summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count results from test-results directory
          FAILED=$(find test-results -name 'test-failed-*.png' 2>/dev/null | wc -l)

          if [ "$FAILED" -gt 0 ]; then
            echo "### ❌ $FAILED test(s) failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Screenshot |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY
            for png in test-results/*/test-failed-*.png; do
              [ -f "$png" ] || continue
              dir=$(dirname "$png" | xargs basename)
              test_name=$(echo "$dir" | sed 's/-chromium$//' | tr '-' ' ')
              echo "| $test_name | 📎 See artifact |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Download the **test-screenshots** artifact for failure screenshots." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure screenshots
        # Also run on cancel so we can see what was failing when the job was cut short
        # (Playwright writes test-failed-*.png + error-context.md per failing test,
        # even when the whole run gets cancelled partway through).
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
