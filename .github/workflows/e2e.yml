name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Write .env from Supabase status
        run: |
          eval "$(supabase status -o env)"
          cat > .env <<EOF
          VITE_SUPABASE_URL=http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' .env

      - name: Serve Edge Functions
        run: supabase functions serve --no-verify-jwt &

      - name: Start dev server
        run: npm run dev &

      - name: Wait for dev server
        run: npx wait-on http://127.0.0.1:5173 --timeout 30000

      - name: Run Playwright tests
        id: tests
        run: npx playwright test

      - name: Write test summary
        if: always()
        run: |
          echo "## E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Count results from test-results directory
          FAILED=$(find test-results -name 'test-failed-*.png' 2>/dev/null | wc -l)

          if [ "$FAILED" -gt 0 ]; then
            echo "### ❌ $FAILED test(s) failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Screenshot |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY
            for png in test-results/*/test-failed-*.png; do
              [ -f "$png" ] || continue
              # Extract test name from directory path
              dir=$(dirname "$png" | xargs basename)
              test_name=$(echo "$dir" | sed 's/-chromium$//' | tr '-' ' ')
              echo "| $test_name | 📎 See artifact |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Download the **test-screenshots** artifact for failure screenshots." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7
